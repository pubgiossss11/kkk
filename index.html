<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>hack dot kick cfvn</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header class="header">
  <div class="brand">
    <div class="logo">
      <img src="assets/logo.svg" alt="T2K" style="width:36px;height:36px;border-radius:50%">
    </div>
    <div class="site-title">Hack dỏ kick an toàn tuyệt đối </div>
  </div>
  <div class="nav">
    <div id="statusArea" class="small">Đang tải...</div>
    <div id="balanceArea" class="small hidden">Số dư: <span id="balance">0</span>₫</div>
    <button id="btnDeposit" class="btn hidden">Nạp tiền</button>
    <button id="btnLogin" class="btn">Đăng nhập</button>
    <button id="btnLogout" class="btn ghost hidden">Đăng xuất</button>
    <button id="themeToggle" class="btn hide-mobile">Đổi giao diện</button>
  </div>
</header>

<main class="container">
  <section class="card">
    <h2>Chúng tôi cung cấp</h2>
    <p class="small">chuyên hack cfvn , an toàn và nhanh chóng. Chọn sản phẩm và đặt hàng chúng tôi sẽ liên hệ với bạn qua phương thức bạn để lại tránh gm mam rợ.</p>
  </section>

  <section class="card">
    <h3>Sản phẩm nổi bật</h3>
    <div id="products" class="grid"></div>
  </section>
</main>

<footer class="footer">©Tool leo rank an toàn</footer>

<div class="fab">
  <button id="btnCart" class="btn primary">Giỏ hàng <span id="cartCount" class="count">0</span></button>
</div>

<script src="common.js"></script>
<script>
// ====== SẢN PHẨM MẪU ======
const PRODUCTS = [
  {id:'p1', title:'bản lite ', desc:'an toàn ,bắn kín ', price:1d/40 7d/240 1th/540},
  {id:'p2', title:'bản wall ', desc:'chir wall an toàn tuyệt đối ', price:1d/40 7d/24" 1th/540},
  {id:'p3', title:' bản full ', desc:'gồm wall aim auto buny dành cho strem an toàn tuyệt đối', price:700k/7d 2000/1th}
];

function renderProducts(){
  const wrap = document.getElementById('products'); wrap.innerHTML='';
  PRODUCTS.forEach(p=>{
    const el = document.createElement('div'); el.className='product card';
    el.innerHTML = `<div class="thumb">🎮</div>
    <h4>${p.title}</h4>
    <p class="small">${p.desc}</p>
    <div class="row" style="justify-content:space-between">
      <div class="price">${fmt(p.price)}</div>
      <button class="btn primary" data-id="${p.id}">Thêm</button>
    </div>`;
    wrap.appendChild(el);
  });
}

// ====== GIỎ HÀNG ======
let CART = JSON.parse(localStorage.getItem('cart')||'[]');
function saveCart(){ localStorage.setItem('cart', JSON.stringify(CART)); updateCartCount(); }
function updateCartCount(){ document.getElementById('cartCount').textContent = CART.reduce((s,i)=>s+i.qty,0); }

document.addEventListener('click', (e)=>{
  const btn = e.target.closest('[data-id]');
  if(btn){
    const id = btn.dataset.id;
    const p = PRODUCTS.find(x=>x.id===id);
    const f = CART.find(x=>x.id===id);
    if(f) f.qty++; else CART.push({...p, qty:1});
    saveCart();
    alert('Đã thêm vào giỏ');
  }
});

// ====== NGƯỜI DÙNG & SỐ DƯ ======
function updateUI(){
  const user = getCurrentUser();
  const loginBtn = document.getElementById('btnLogin');
  const logoutBtn = document.getElementById('btnLogout');
  const depositBtn = document.getElementById('btnDeposit');
  const balanceArea = document.getElementById('balanceArea');
  const statusArea = document.getElementById('statusArea');

  if(user){
    loginBtn.classList.add('hidden');
    logoutBtn.classList.remove('hidden');
    depositBtn.classList.remove('hidden');
    balanceArea.classList.remove('hidden');
    statusArea.textContent = `Xin chào, ${user.display || user.username}`;

    const u = findUser(user.username);
    const balance = u?.balance || 0;
    document.getElementById('balance').textContent = fmt(balance);
  } else {
    loginBtn.classList.remove('hidden');
    logoutBtn.classList.add('hidden');
    depositBtn.classList.add('hidden');
    balanceArea.classList.add('hidden');
    statusArea.textContent = 'Chưa đăng nhập';
  }
}

// ====== NẠP TIỀN ======
document.getElementById('btnDeposit').addEventListener('click', ()=>{
  const user = getCurrentUser();
  if(!user){ alert('Vui lòng đăng nhập trước.'); return; }

  const amount = parseInt(prompt('Nhập số tiền muốn nạp (VNĐ):'));
  if(isNaN(amount) || amount <= 0){ alert('Số tiền không hợp lệ.'); return; }

  const u = findUser(user.username);
  u.balance = (u.balance || 0) + amount;
  saveUser(u);
  alert(`Nạp thành công ${fmt(amount)}₫!`);
  updateUI();
});

// ====== SỰ KIỆN KHÁC ======
document.getElementById('btnCart').addEventListener('click', ()=>{ window.location.href='order.html'; });
document.getElementById('btnLogin').addEventListener('click', ()=>{ window.location.href='login.html'; });
document.getElementById('btnLogout').addEventListener('click', ()=>{ logout(); updateUI(); });
document.getElementById('themeToggle').addEventListener('click', ()=>{ toggleTheme(); });

renderProducts();
updateCartCount();
updateUI();
</script>
</body>
</html>
