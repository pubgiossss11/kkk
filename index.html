<!doctype html>

<html lang="vi">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>T2K Store</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<style>

*{

    margin:0;

    padding:0;

    box-sizing:border-box;

    font-family:Arial,sans-serif;

}

body{

    background:#050816;

    color:white;

    overflow-x:hidden;

}

/* HEADER */

header{

    width:100%;

    background:#0d111d;

    padding:15px 20px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    border-bottom:2px solid #1b2235;

    position:sticky;

    top:0;

    z-index:1000;

}

.logo-area{

    display:flex;

    align-items:center;

    gap:10px;

}

.logo{

    width:45px;

    height:45px;

    border-radius:50%;

    background:#1f6fff;

    display:flex;

    justify-content:center;

    align-items:center;

    font-weight:bold;

    font-size:18px;

}

.site-name{

    font-size:24px;

    font-weight:bold;

    letter-spacing:1px;

}

.menu-btn{

    background:none;

    border:none;

    color:white;

    font-size:32px;

    cursor:pointer;

}

/* HERO */

.hero{

    width:100%;

    height:260px;

    background:url('https://i.imgur.com/G0KXw1x.jpeg') center/cover;

    display:flex;

    justify-content:center;

    align-items:center;

    position:relative;

}

.hero::after{

    content:'';

    position:absolute;

    inset:0;

    background:rgba(0,0,0,.55);

}

.hero-content{

    position:relative;

    z-index:2;

    text-align:center;

}

.hero h1{

    font-size:50px;

    margin-bottom:10px;

    text-shadow:0 0 20px #000;

}

.hero p{

    color:#ddd;

    font-size:18px;

}

/* CONTAINER */

.container{

    max-width:1200px;

    margin:auto;

    padding:20px;

}

/* CARD */

.shop-card{

    background:#0b1020;

    border:1px solid #1e2944;

    border-radius:15px;

    overflow:hidden;

    margin-bottom:35px;

    box-shadow:0 0 25px rgba(0,0,0,.4);

    transition:.25s;

}

.shop-card:hover{

    transform:translateY(-5px);

    border-color:#2979ff;

}

.banner{

    width:100%;

    height:260px;

    object-fit:cover;

}

.content{

    padding:20px;

}

.title{

    font-size:38px;

    margin-bottom:15px;

    text-transform:uppercase;

}

.desc{

    color:#aaa;

    margin-bottom:20px;

    line-height:1.6;

}

/* SELECT */

.package-select{

    width:100%;

    padding:16px;

    border:none;

    outline:none;

    border-radius:8px;

    font-size:22px;

    margin-bottom:15px;

    background:#ececec;

}

/* BUTTON */

.buy-btn{

    width:100%;

    padding:16px;

    background:#ff9800;

    border:none;

    color:white;

    font-size:28px;

    border-radius:8px;

    cursor:pointer;

    transition:.2s;

    margin-bottom:15px;

}

.buy-btn:hover{

    background:#ffb13b;

}

.download-btn{

    width:100%;

    padding:15px;

    background:white;

    color:black;

    border:none;

    border-radius:8px;

    font-size:22px;

    cursor:pointer;

}

/* FLOATING CART */

.cart{

    position:fixed;

    right:20px;

    bottom:20px;

    background:#2979ff;

    padding:15px 20px;

    border-radius:50px;

    font-size:20px;

    cursor:pointer;

    box-shadow:0 0 20px rgba(41,121,255,.5);

}

/* FOOTER */

footer{

    text-align:center;

    padding:30px;

    color:#777;

}

/* MOBILE */

@media(max-width:768px){

.hero{

    height:180px;

}

.hero h1{

    font-size:34px;

}

.title{

    font-size:28px;

}

.package-select{

    font-size:18px;

}

.buy-btn{

    font-size:22px;

}

.download-btn{

    font-size:18px;

}

.banner{

    height:200px;

}

}

</style>

</head>

<body>

<header>

    <div class="logo-area">

        <div class="logo">T2K</div>

        <div class="site-name">T2K STORE</div>

    </div>

    <button class="menu-btn">☰</button>

</header>

<section class="hero">

    <div class="hero-content">

        <h1>T2K STORE</h1>

        <p>Digital Gaming Platform</p>

    </div>

</section>

<div class="container">

    <!-- CARD 1 -->

    <div class="shop-card">

        <img src="https://i.imgur.com/UPrs1EW.jpeg" class="banner">

        <div class="content">

            <div class="title">

                GÓI LITE

            </div>

            <div class="desc">

                Phiên bản cơ bản dành cho người mới.

            </div>

            <select class="package-select">

                <option>--- Chọn gói ---</option>

                <option>40.000đ / 1 Ngày</option>

                <option>240.000đ / 7 Ngày</option>

                <option>540.000đ / 30 Ngày</option>

            </select>

            <button class="buy-btn">

                Thuê ngay

            </button>

            <button class="download-btn">

                📹 Hướng dẫn sử dụng

            </button>

        </div>

    </div>

    <!-- CARD 2 -->

    <div class="shop-card">

        <img src="https://i.imgur.com/oYiTqum.jpeg" class="banner">

        <div class="content">

            <div class="title">

                GÓI PREMIUM

            </div>

            <div class="desc">

                Phiên bản nâng cao với nhiều tính năng hơn.

            </div>

            <select class="package-select">

                <option>--- Chọn gói ---</option>

                <option>70.000đ / 1 Ngày</option>

                <option>450.000đ / 7 Ngày</option>

                <option>900.000đ / 30 Ngày</option>

            </select>

            <button class="buy-btn">

                Thuê ngay

            </button>

            <button class="download-btn">

                📹 Hướng dẫn sử dụng

            </button>

        </div>

    </div>

</div>

<div class="cart">

🛒 Giỏ hàng (<span id="cart-count">0</span>)

</div>

<footer>

© 2026 T2K Store

</footer>

<script>

let cart = 0;

const buyButtons = document.querySelectorAll('.buy-btn');

buyButtons.forEach(btn=>{

    btn.addEventListener('click', ()=>{

        cart++;

        document.getElementById('cart-count').innerText = cart;

        alert('Đã thêm vào giỏ hàng');

    });

});

</script>

</body>

</html>
